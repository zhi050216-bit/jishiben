<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>瞬记 · 实时保存记事本</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f6f9fc 0%, #edf2f7 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            padding: 2rem 1.5rem;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 主卡片容器 */
        .notebook {
            max-width: 1000px;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(0px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 2px 5px rgba(0, 0, 0, 0.02);
            transition: all 0.2s ease;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* 头部区域 */
        .notebook-header {
            padding: 1.8rem 2rem 0.8rem 2rem;
            border-bottom: 1px solid #e9edf2;
            background: #ffffffd9;
        }

        .notebook-header h1 {
            font-size: 1.85rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #1f2b3c, #2c3e50);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .notebook-header h1::before {
            content: "📓";
            font-size: 1.8rem;
            background: none;
            color: #3a5a7a;
        }

        .sub {
            color: #5b6f82;
            font-size: 0.85rem;
            margin-top: 0.4rem;
            font-weight: 400;
        }

        /* 标题输入框 */
        .title-area {
            padding: 1.2rem 2rem 0 2rem;
        }

        .note-title {
            width: 100%;
            font-size: 1.7rem;
            font-weight: 600;
            border: none;
            outline: none;
            background: transparent;
            font-family: inherit;
            color: #1a2c3e;
            padding: 0.5rem 0;
            border-bottom: 2px solid #e2e8f0;
            transition: border 0.2s;
        }

        .note-title:focus {
            border-bottom-color: #5b9cbf;
        }

        .note-title::placeholder {
            color: #b9c8e0;
            font-weight: 400;
            font-size: 1.5rem;
        }

        /* 正文区 */
        .content-area {
            padding: 1rem 2rem 1rem 2rem;
        }

        .note-body {
            width: 100%;
            min-height: 380px;
            padding: 1rem 0.5rem;
            font-size: 1rem;
            line-height: 1.6;
            font-family: inherit;
            border: none;
            outline: none;
            resize: vertical;
            background: transparent;
            color: #1e2f3f;
            font-weight: 400;
        }

        .note-body::placeholder {
            color: #cbdbe0;
            font-size: 0.95rem;
        }

        /* 工具栏 & 状态栏 */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem 2rem 1.5rem 2rem;
            background: #fafcff;
            border-top: 1px solid #ecf1f6;
        }

        .status-area {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            font-size: 0.8rem;
        }

        .save-indicator {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: #2c6b2f;
            font-weight: 500;
            background: #e9f5ea;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            width: fit-content;
            font-size: 0.75rem;
        }

        .save-time {
            color: #5e727e;
            font-size: 0.7rem;
            letter-spacing: 0.2px;
        }

        .word-count {
            color: #6e889b;
            font-size: 0.7rem;
            background: #eff3f8;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            display: inline-block;
        }

        .button-group {
            display: flex;
            gap: 0.7rem;
            flex-wrap: wrap;
        }

        .btn {
            background: white;
            border: 1px solid #cfdfed;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #2c4c6c;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            backdrop-filter: blur(2px);
        }

        .btn i {
            font-style: normal;
            font-weight: 500;
        }

        .btn:hover {
            background: #eef4fa;
            border-color: #b7d0e5;
            transform: translateY(-1px);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.03);
        }

        .btn-clear {
            color: #a13e3e;
            border-color: #f3cfcf;
            background: #fff7f7;
        }

        .btn-clear:hover {
            background: #ffecec;
            border-color: #dc9e9e;
        }

        .btn-export {
            background: #f0f6fe;
            border-color: #bdd8f0;
            color: #1b5a8c;
        }

        hr {
            margin: 0;
            border: none;
            border-top: 1px solid #ecf3f9;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            padding: 1rem;
            color: #8ca3b5;
            background: #ffffffc9;
            border-top: 1px solid #ecf1f6;
        }

        footer a {
            color: #4f7ea3;
            text-decoration: none;
        }

        /* 响应式 */
        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }
            .notebook-header {
                padding: 1.2rem 1.2rem 0.5rem 1.2rem;
            }
            .title-area, .content-area, .toolbar {
                padding-left: 1.2rem;
                padding-right: 1.2rem;
            }
            .note-title {
                font-size: 1.4rem;
            }
            .note-body {
                min-height: 260px;
            }
            .button-group {
                width: 100%;
                justify-content: flex-start;
            }
            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }
        }

        /* 暗色模式偏好跟随 */
        @media (prefers-color-scheme: dark) {
            body {
                background: linear-gradient(145deg, #1a262f, #111a20);
            }
            .notebook {
                background: #1f2c34ea;
                backdrop-filter: blur(2px);
                border-color: #2a3a44;
            }
            .notebook-header, .toolbar, footer {
                background: #1e2b33d9;
                border-color: #2e404c;
            }
            .note-title, .note-body {
                color: #e3edf2;
            }
            .note-title::placeholder, .note-body::placeholder {
                color: #5f7c8c;
            }
            .btn {
                background: #2e3f48;
                border-color: #405b67;
                color: #d6e6ef;
            }
            .btn:hover {
                background: #3b515c;
            }
            .btn-clear {
                background: #382a2a;
                border-color: #764e4e;
                color: #ffcfcf;
            }
            .btn-clear:hover {
                background: #4f3636;
            }
            .save-indicator {
                background: #2d4a2f;
                color: #c0f0c5;
            }
            .save-time, .word-count {
                color: #b1cadb;
                background: #2a3b44;
            }
            .sub, footer, footer a {
                color: #98aebd;
            }
            .note-title:focus {
                border-bottom-color: #7dafcf;
            }
        }
    </style>
</head>
<body>

<div class="notebook">
    <div class="notebook-header">
        <h1>瞬记 · 即时笔记</h1>
        <div class="sub">✍️ 自动保存到浏览器 · 关闭窗口也不丢失</div>
    </div>

    <div class="title-area">
        <input type="text" id="noteTitle" class="note-title" placeholder="笔记标题" autocomplete="off">
    </div>

    <div class="content-area">
        <textarea id="noteContent" class="note-body" placeholder="写下你的灵感、待办或日记... 内容会被实时保存 ✨" rows="12"></textarea>
    </div>

    <div class="toolbar">
        <div class="status-area">
            <div class="save-indicator" id="saveStatus">
                <span>💾</span> <span id="statusText">已就绪</span>
            </div>
            <div class="save-time" id="saveTimeDisplay">
                上次保存: 未保存
            </div>
            <div class="word-count" id="wordCount">
                字数: 0
            </div>
        </div>
        <div class="button-group">
            <button class="btn" id="exportBtn" title="导出为 .txt 文件">📄 导出笔记</button>
            <button class="btn btn-clear" id="clearBtn" title">🗑️ 清除所有内容</button>
        </div>
    </div>
    <footer>
        🌐 托管于 GitHub Pages · 数据存储在您的浏览器 (localStorage) 中，完全私密 · 实时保存
    </footer>
</div>

<script>
    (function() {
        // ----- DOM 元素 -----
        const titleInput = document.getElementById('noteTitle');
        const contentTextarea = document.getElementById('noteContent');
        const statusTextSpan = document.getElementById('statusText');
        const saveTimeSpan = document.getElementById('saveTimeDisplay');
        const wordCountSpan = document.getElementById('wordCount');
        const exportBtn = document.getElementById('exportBtn');
        const clearBtn = document.getElementById('clearBtn');

        // ----- localStorage 键名 -----
        const STORAGE_KEYS = {
            TITLE: 'quicknote_title',
            CONTENT: 'quicknote_content',
            LAST_SAVED: 'quicknote_last_saved'
        };

        // 默认示例内容 (初次访问时使用)
        const DEFAULT_TITLE = "📌 欢迎使用瞬记";
        const DEFAULT_CONTENT = `✨ 这是一个会自动保存的记事本网站！

• 所有文字都会实时存储到浏览器的本地存储中。
• 关闭页面、刷新浏览器，再次打开内容依然存在。
• 标题和正文都会自动保存，还会记录最后保存时间。
• 点击「导出笔记」可以将当前内容保存为 .txt 文件。
• 点击「清除所有内容」会清空并重置笔记（确认后不可恢复）。

💡 尽情书写，每处更改都会自动保存，无需任何手动操作。`;

        // 防抖定时器
        let debounceTimer = null;
        // 防抖延迟 (毫秒) —— 输入停止后 400ms 自动保存，体验流畅且避免频繁写入
        const DEBOUNCE_DELAY = 400;

        // ----- 辅助函数：更新字数统计 -----
        function updateWordCount() {
            const text = contentTextarea.value;
            // 统计实际字符数 (包含空格与换行，直观显示)
            const length = text.length;
            wordCountSpan.textContent = `字数: ${length} 字符`;
            return length;
        }

        // ----- 核心保存逻辑: 将当前界面内容存入 localStorage -----
        // 参数: showStatusFeedback (是否显示“已保存”提示闪烁)
        function performSave(showFeedback = true) {
            try {
                const currentTitle = titleInput.value;
                const currentContent = contentTextarea.value;
                const now = new Date();
                const timestampISO = now.toISOString();
                const formattedTime = formatTimestamp(now);

                // 存储到 localStorage
                localStorage.setItem(STORAGE_KEYS.TITLE, currentTitle);
                localStorage.setItem(STORAGE_KEYS.CONTENT, currentContent);
                localStorage.setItem(STORAGE_KEYS.LAST_SAVED, timestampISO);

                // 更新界面: 保存时间显示
                if (formattedTime) {
                    saveTimeSpan.textContent = `上次保存: ${formattedTime}`;
                } else {
                    saveTimeSpan.textContent = `上次保存: 刚刚`;
                }

                // 更新状态提示 (轻反馈)
                if (showFeedback) {
                    statusTextSpan.textContent = '已保存';
                    // 2秒后恢复 “已就绪” 状态，但不要干扰实时保存提示感
                    setTimeout(() => {
                        if (statusTextSpan.textContent === '已保存') {
                            statusTextSpan.textContent = '已就绪';
                        }
                    }, 1500);
                } else {
                    statusTextSpan.textContent = '已就绪';
                }

                // 同时更新字数 (确保字数最新)
                updateWordCount();
                return true;
            } catch (e) {
                console.error('保存失败:', e);
                statusTextSpan.textContent = '保存失败';
                setTimeout(() => {
                    if (statusTextSpan.textContent === '保存失败') statusTextSpan.textContent = '已就绪';
                }, 2000);
                return false;
            }
        }

        // 将 ISO 时间转为本地友好格式 YYYY/MM/DD HH:MM:SS
        function formatTimestamp(date) {
            if (!date) return '未知时间';
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');
            return `${year}/${month}/${day} ${hours}:${minutes}:${seconds}`;
        }

        // 从 localStorage 加载数据并填充到界面
        function loadFromLocalStorage() {
            let savedTitle = localStorage.getItem(STORAGE_KEYS.TITLE);
            let savedContent = localStorage.getItem(STORAGE_KEYS.CONTENT);
            let savedTimeISO = localStorage.getItem(STORAGE_KEYS.LAST_SAVED);

            // 判断是否需要填充默认内容 (初次访问)
            const isFirstVisit = (savedTitle === null && savedContent === null);

            if (isFirstVisit) {
                // 使用默认内容写入存储并填充
                titleInput.value = DEFAULT_TITLE;
                contentTextarea.value = DEFAULT_CONTENT;
                // 立即保存默认内容到 localStorage 并记录时间
                const now = new Date();
                localStorage.setItem(STORAGE_KEYS.TITLE, DEFAULT_TITLE);
                localStorage.setItem(STORAGE_KEYS.CONTENT, DEFAULT_CONTENT);
                localStorage.setItem(STORAGE_KEYS.LAST_SAVED, now.toISOString());
                saveTimeSpan.textContent = `上次保存: ${formatTimestamp(now)}`;
                statusTextSpan.textContent = '已就绪';
                updateWordCount();
            } else {
                // 已有数据: 填充标题和内容
                titleInput.value = savedTitle !== null ? savedTitle : '';
                contentTextarea.value = savedContent !== null ? savedContent : '';
                updateWordCount();

                if (savedTimeISO) {
                    try {
                        const savedDate = new Date(savedTimeISO);
                        if (!isNaN(savedDate.getTime())) {
                            saveTimeSpan.textContent = `上次保存: ${formatTimestamp(savedDate)}`;
                        } else {
                            saveTimeSpan.textContent = `上次保存: 记录异常`;
                        }
                    } catch (e) {
                        saveTimeSpan.textContent = `上次保存: 未知时间`;
                    }
                } else {
                    saveTimeSpan.textContent = `上次保存: 无历史记录`;
                }
                statusTextSpan.textContent = '已就绪';
            }
        }

        // ----- 防抖保存 (实时保存的核心) -----
        function debouncedSave() {
            // 每次输入时，改变状态为“待保存...”提升实时感
            statusTextSpan.textContent = '编辑中...';
            // 清除之前的计时器
            if (debounceTimer) {
                clearTimeout(debounceTimer);
            }
            // 设置新的防抖计时器
            debounceTimer = setTimeout(() => {
                // 执行实际保存，并且显示反馈
                performSave(true);
                debounceTimer = null;
            }, DEBOUNCE_DELAY);
        }

        // ----- 立即强制保存 (用于页面关闭、清除前的最终快照)-----
        function forceSaveNow() {
            if (debounceTimer) {
                clearTimeout(debounceTimer);
                debounceTimer = null;
            }
            performSave(true);
        }

        // ----- 清除所有内容 (清空标题和正文，重置存储)-----
        function clearAllNotes() {
            // 二次确认防止误触
            const userConfirmed = confirm('⚠️ 确认要清空所有笔记内容吗？\n清空后数据将永久删除，且无法恢复。');
            if (!userConfirmed) return;

            // 清空输入框的值
            titleInput.value = '';
            contentTextarea.value = '';
            // 立即强制保存空内容 (同时也清除 localStorage 原有内容)
            try {
                localStorage.setItem(STORAGE_KEYS.TITLE, '');
                localStorage.setItem(STORAGE_KEYS.CONTENT, '');
                const clearTime = new Date();
                localStorage.setItem(STORAGE_KEYS.LAST_SAVED, clearTime.toISOString());
                saveTimeSpan.textContent = `上次保存: ${formatTimestamp(clearTime)} (已清空)`;
                statusTextSpan.textContent = '已清空';
                updateWordCount();
                // 额外增加几秒提示恢复
                setTimeout(() => {
                    if (statusTextSpan.textContent === '已清空') statusTextSpan.textContent = '已就绪';
                }, 1800);
            } catch (e) {
                console.error('清除失败', e);
                alert('清除时出现错误，请重试');
            }
        }

        // ----- 导出笔记为 .txt 文件 -----
        function exportAsTxt() {
            const title = titleInput.value.trim() || "无标题笔记";
            const content = contentTextarea.value || "";
            // 构建导出内容: 包含标题和正文的分隔
            const exportDate = new Date();
            const dateStr = formatTimestamp(exportDate);
            const exportContent = `标题：${title}\n导出时间：${dateStr}\n\n${'='.repeat(40)}\n\n${content}\n\n${'='.repeat(40)}\n瞬记 · 实时保存记事本 导出`;
            
            // 创建 Blob 并下载
            const blob = new Blob([exportContent], { type: 'text/plain;charset=utf-8' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.href = url;
            // 文件名: 笔记_年月日时分秒.txt
            const now = new Date();
            const fileTimestamp = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
            link.download = `瞬记_${title.slice(0, 20)}_${fileTimestamp}.txt`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            
            // 给出反馈
            const originalStatus = statusTextSpan.textContent;
            statusTextSpan.textContent = '已导出';
            setTimeout(() => {
                statusTextSpan.textContent = originalStatus === '已导出' ? '已就绪' : originalStatus;
            }, 1500);
        }

        // ----- 监听页面关闭/刷新前 强制保存最新内容 (避免防抖未执行完)-----
        function handleBeforeUnload() {
            // 直接将当前输入框的最新内容保存 (同步写入localStorage)
            try {
                const currentTitle = titleInput.value;
                const currentContent = contentTextarea.value;
                localStorage.setItem(STORAGE_KEYS.TITLE, currentTitle);
                localStorage.setItem(STORAGE_KEYS.CONTENT, currentContent);
                localStorage.setItem(STORAGE_KEYS.LAST_SAVED, new Date().toISOString());
            } catch(e) { /* 静默失败 */ }
        }

        // ----- 初始化事件绑定 -----
        function initEventListeners() {
            // 标题输入: 实时保存（防抖）
            titleInput.addEventListener('input', () => {
                debouncedSave();
            });
            // 正文输入: 实时保存（防抖）
            contentTextarea.addEventListener('input', () => {
                debouncedSave();
                // 输入时顺便更新实时字数统计（即时刷新，提升体验）
                updateWordCount();
            });
            // 额外的焦点离开时，为防止丢失，立即保存一次，确保内容完整同步
            titleInput.addEventListener('blur', () => {
                if (debounceTimer) {
                    clearTimeout(debounceTimer);
                    debounceTimer = null;
                }
                performSave(true);
            });
            contentTextarea.addEventListener('blur', () => {
                if (debounceTimer) {
                    clearTimeout(debounceTimer);
                    debounceTimer = null;
                }
                performSave(true);
                updateWordCount(); // 再次确保字数
            });
            
            // 清除按钮
            clearBtn.addEventListener('click', clearAllNotes);
            // 导出按钮
            exportBtn.addEventListener('click', exportAsTxt);
            
            // 页面关闭或刷新前强制保存 (弥补防抖可能丢弃的最后一次)
            window.addEventListener('beforeunload', handleBeforeUnload);
        }
        
        // 监听内容变化时保持字数动态刷新 (除input事件外，还有初始化等)
        // 并且额外保证手动修改时都会触发保存
        function startAutoSaveFeature() {
            loadFromLocalStorage();    // 读取已有数据或初始化默认
            initEventListeners();      // 绑定交互事件
            // 确保初始字数显示正确
            updateWordCount();
            // 附加: 如果当前内容为空但存储无内容但默认内容已经处理，完美。
            // 额外定期检查? 不需要，因为每次输入都已经触发防抖，但在某些极端情况下边缘场景: 当用户只使用程序清除后，状态已经完全刷新
        }
        
        // 启动应用
        startAutoSaveFeature();
    })();
</script>
</body>
</html>
